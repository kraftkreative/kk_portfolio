<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KRAFTKREATIVE PHOTOGRAPHY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>


<header class="brand">KRAFTKREATIVE PHOTOGRAPHY</header>

<!-- HOME -->
<section id="home" class="page active">

  <!-- HERO -->
  <div class="hero-honeycomb"></div>

  <!-- INTRO -->
  <div class="intro">
    <div class="intro-text">
      <h2>Hey, my name is KRISH</h2>
      <p>
        I am a Bangalore-based photographer focused on capturing raw,
        cinematic and authentic moments that last forever.
      </p>
    </div>

    <div class="intro-image">
      <img src="portfolio 2/assets/me.jpg" alt="Krish">
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-section">
    <div class="portfolio-btn" id="goPortfolio">PORTFOLIO</div>
    <img src="assets/cta-image.jpg" alt="CTA">
  </div>

</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="page">

  <button id="backHome" class="back-btn">← Home</button>

  <div class="portfolio-layout">

    <div class="gallery">
      <button id="prev">‹</button>
      <img id="viewer" src="assets/sample.jpg">
      <button id="next">›</button>
    </div>

    <div class="sidebar">
      <h3>WHAT WE DO</h3>
      <ul id="categories">
        <li>Portraits</li>
        <li>Weddings</li>
        <li>Love Stories</li>
        <li>Commercial</li>
      </ul>
    </div>

  </div>

</section>

<script>
  const home = document.getElementById("home");
  const portfolio = document.getElementById("portfolio");

  document.getElementById("goPortfolio").onclick = () => {
    home.classList.remove("active");
    portfolio.classList.add("active");
    window.scrollTo(0,0);
  };

  document.getElementById("backHome").onclick = () => {
    portfolio.classList.remove("active");
    home.classList.add("active");
    window.scrollTo(0,0);
  };

  // ESC key support
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      portfolio.classList.remove("active");
      home.classList.add("active");
    }
  });
</script>

</body>
</html>
